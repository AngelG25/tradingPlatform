server:
  port: 8090

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/trading-app

  cloud:
    gateway:
      routes:
        - id: market-data-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/market/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"