server:
  port: 8090

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/trading-app

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: market-data-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/market/**
              filters:
                - StripPrefix=1

            - id: user-manager-route
              uri: http://localhost:8083
              predicates:
                - Path=/api/users/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true